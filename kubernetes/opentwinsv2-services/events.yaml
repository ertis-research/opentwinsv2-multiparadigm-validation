apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentwinsv2-events-deploy
  labels:
    app: opentwinsv2-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentwinsv2-events
  template:
    metadata:
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "events-service"
        dapr.io/app-port: "8080"
        dapr.io/config: "dapr-config"               # Nombre del ConfigMap si lo usas
      labels:
        app: opentwinsv2-events
    spec:
      containers:
        - name: opentwinsv2-events
          image: opentwinsv2-events:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
 
---

apiVersion: v1
kind: Service
metadata:
  name: opentwinsv2-events-svc
spec:
  type: NodePort
  selector:
    app: opentwinsv2-events
  ports:
    - name: http
      port: 80  
      targetPort: 8080  
      nodePort: 30355 