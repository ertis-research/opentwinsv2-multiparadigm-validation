apiVersion: v1
kind: ConfigMap
metadata:
  name: otv2-mpm-mosquitto-config
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence false
    max_inflight_messages 10000
    max_queued_messages 1000000
---
apiVersion: v1
kind: Service
metadata:
  name: otv2-mpm-mosquitto
spec:
  type: NodePort
  selector:
    app: otv2-mpm-mosquitto
  ports:
    - port: 1883
      targetPort: 1883
      nodePort: 32883  # Puedes elegir otro entre 30000–32767
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otv2-mpm-mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otv2-mpm-mosquitto
  template:
    metadata:
      labels:
        app: otv2-mpm-mosquitto
    spec:
      containers:
        - name: otv2-mpm-mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 1883
          volumeMounts:
            - name: otv2-mpm-mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: otv2-mpm-mosquitto-config
          configMap:
            name: otv2-mpm-mosquitto-config