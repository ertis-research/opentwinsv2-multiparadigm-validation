apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: otv2-mpm-timescaledb
spec:
  serviceName: otv2-mpm-timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: otv2-mpm-timescaledb
  template:
    metadata:
      labels:
        app: otv2-mpm-timescaledb
    spec:
      containers:
        - name: otv2-mpm-timescaledb
          image: 'timescale/timescaledb:latest-pg17'
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: timescale-storage
      volumes:
        - name: timescale-storage
          persistentVolumeClaim:
            claimName: otv2-mpm-pvc

---


apiVersion: v1
kind: Service
metadata:
  name: otv2-mpm-timescaledb
spec:
  selector:
    app: otv2-mpm-timescaledb
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      nodePort: 31223
  type: NodePort